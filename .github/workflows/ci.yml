name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shell-syntax:
    name: Синтаксис bash-скриптов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n install.sh && bash -n uninstall.sh && echo OK

  powershell-syntax:
    name: Синтаксис PowerShell (включая настоящий PS 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse в Windows PowerShell 5.1
        shell: powershell
        run: |
          $bad = 0
          foreach ($f in @("install.ps1","uninstall.ps1")) {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile("$PWD\$f", [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -eq 0) { Write-Host "OK (PS 5.1): $f" }
            else { $bad = 1; $errors | ForEach-Object { Write-Host ("ERR ${f}: " + $_.Message) } }
          }
          exit $bad
      - name: Parse в PowerShell 7
        shell: pwsh
        run: |
          $bad = 0
          foreach ($f in @("install.ps1","uninstall.ps1")) {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile("$PWD/$f", [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -eq 0) { Write-Host "OK (PS 7): $f" }
            else { $bad = 1; $errors | ForEach-Object { Write-Host ("ERR ${f}: " + $_.Message) } }
          }
          exit $bad

  build-and-smoke:
    name: Сборка + smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-fund --no-audit
      - run: npm run typecheck
      - run: npm run build
      - name: Smoke-тест (сервер стартует, 16 инструментов)
        run: node tests/ci-smoke.mjs
